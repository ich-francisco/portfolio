<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fundo Roxo com cantos levemente arredondados para um visual moderno -->
  <rect width="512" height="512" rx="110" fill="#6a0dad"/>
  
  <!-- Brackets </> em Branco bem legíveis -->
  <text x="50%" y="53%" 
        font-family="monospace, sans-serif" 
        font-size="280" 
        font-weight="bold" 
        fill="#ffffff" 
        dominant-baseline="middle" 
        text-anchor="middle">&lt;/&gt;</text>
</svg>
